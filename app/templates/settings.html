{% extends "base.html" %}
{% block title_suffix %} - Settings{% endblock %}

{% block content %}
<div x-data="settingsPage()" x-init="init()">
    <h2>Settings</h2>

    <!-- Plex Connection -->
    <div class="card">
        <h3>Plex Connection</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Server URL</label>
                <input type="text" x-model="config.plex.base_url" placeholder="http://localhost:32400">
            </div>
            <div class="form-group">
                <label>Token</label>
                <input type="password" x-model="config.plex.token" placeholder="Plex token">
            </div>
            <div class="form-group">
                <label>Timeout (seconds)</label>
                <input type="number" x-model.number="config.plex.timeout" min="5" max="120">
            </div>
        </div>
    </div>

    <!-- App Settings -->
    <div class="card">
        <h3>Application</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Host</label>
                <input type="text" x-model="config.app.host">
            </div>
            <div class="form-group">
                <label>Port</label>
                <input type="number" x-model.number="config.app.port" min="1024" max="65535">
            </div>
            <div class="form-group">
                <label>Log Level</label>
                <select x-model="config.app.log_level">
                    <option>DEBUG</option>
                    <option>INFO</option>
                    <option>WARNING</option>
                    <option>ERROR</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <label class="toggle-label">
                <input type="checkbox" x-model="config.app.dry_run">
                Dry run by default
            </label>
            <label class="toggle-label">
                <input type="checkbox" x-model="config.app.skip_locked">
                Skip locked posters
            </label>
            <label class="toggle-label">
                <input type="checkbox" x-model="config.app.force_replace">
                Force replace existing posters
            </label>
        </div>
    </div>

    <!-- Scoring Settings -->
    <div class="card">
        <h3>Poster Scoring</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Minimum Width (px)</label>
                <input type="number" x-model.number="config.scoring.min_width" min="0">
            </div>
            <div class="form-group">
                <label>Minimum Height (px)</label>
                <input type="number" x-model.number="config.scoring.min_height" min="0">
            </div>
            <div class="form-group">
                <label>Preferred Aspect Ratio</label>
                <input type="number" x-model.number="config.scoring.preferred_aspect_ratio"
                       step="0.01" min="0.1" max="2.0">
                <small class="text-muted">Standard poster: 0.667 (2:3)</small>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Resolution Weight</label>
                <input type="number" x-model.number="config.scoring.resolution_weight" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label>Aspect Ratio Weight</label>
                <input type="number" x-model.number="config.scoring.aspect_ratio_weight" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label>Provider Weight</label>
                <input type="number" x-model.number="config.scoring.provider_weight" step="0.1" min="0">
            </div>
        </div>
        <div class="form-row">
            <label class="toggle-label">
                <input type="checkbox" x-model="config.scoring.prefer_provider_posters">
                Prefer provider posters
            </label>
            <label class="toggle-label">
                <input type="checkbox" x-model="config.scoring.penalize_landscape">
                Penalize landscape images
            </label>
        </div>
        <div class="form-group">
            <label>Provider Priority (comma separated)</label>
            <input type="text" x-model="providerPriorityStr"
                   placeholder="tmdb,tvdb,gracenote,local,upload">
        </div>
    </div>

    <!-- Library Filters -->
    <div class="card">
        <h3>Library Filters</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Whitelisted Libraries (comma separated, empty = all)</label>
                <input type="text" x-model="whitelistStr"
                       placeholder="Movies, TV Shows">
            </div>
            <div class="form-group">
                <label>Blacklisted Libraries (comma separated)</label>
                <input type="text" x-model="blacklistStr"
                       placeholder="Music, Photos">
            </div>
        </div>
    </div>

    <div class="card-actions">
        <button class="btn btn-primary" @click="save()" :disabled="saving">
            <span x-show="!saving">Save Settings</span>
            <span x-show="saving">Saving...</span>
        </button>
        <span x-show="saveMessage" class="text-success" x-text="saveMessage"></span>
    </div>
</div>

<script>
function settingsPage() {
    return {
        config: {
            plex: {base_url: '', token: '', timeout: 30},
            scoring: {
                min_width: 300, min_height: 450,
                preferred_aspect_ratio: 0.6667,
                aspect_ratio_tolerance: 0.15,
                prefer_provider_posters: true,
                provider_priority: [],
                resolution_weight: 1.0,
                aspect_ratio_weight: 1.5,
                provider_weight: 1.0,
                penalize_landscape: true,
                landscape_penalty: -5.0
            },
            app: {
                host: '0.0.0.0', port: 8888,
                dry_run: true, skip_locked: true,
                force_replace: false, log_level: 'INFO',
                whitelisted_libraries: [],
                blacklisted_libraries: []
            }
        },
        providerPriorityStr: '',
        whitelistStr: '',
        blacklistStr: '',
        saving: false,
        saveMessage: '',

        async init() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                // Merge loaded config
                if (data.plex) Object.assign(this.config.plex, data.plex);
                if (data.scoring) Object.assign(this.config.scoring, data.scoring);
                if (data.app) Object.assign(this.config.app, data.app);

                this.providerPriorityStr = (this.config.scoring.provider_priority || []).join(', ');
                this.whitelistStr = (this.config.app.whitelisted_libraries || []).join(', ');
                this.blacklistStr = (this.config.app.blacklisted_libraries || []).join(', ');
            } catch (e) {
                console.error('Failed to load config:', e);
            }
        },

        async save() {
            this.saving = true;
            this.saveMessage = '';

            // Parse comma-separated lists
            this.config.scoring.provider_priority = this.providerPriorityStr
                .split(',').map(s => s.trim()).filter(s => s);
            this.config.app.whitelisted_libraries = this.whitelistStr
                .split(',').map(s => s.trim()).filter(s => s);
            this.config.app.blacklisted_libraries = this.blacklistStr
                .split(',').map(s => s.trim()).filter(s => s);

            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        scoring: this.config.scoring,
                        app: this.config.app
                    })
                });
                this.saveMessage = 'Settings saved!';
                setTimeout(() => this.saveMessage = '', 3000);
            } catch (e) {
                this.saveMessage = 'Failed to save: ' + e.message;
            }
            this.saving = false;
        }
    }
}
</script>
{% endblock %}
